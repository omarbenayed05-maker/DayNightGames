<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Card Pack Creator</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .card-form input, .card-form textarea {
      margin-top: 6px;
    }
    textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #3a3d4d;
      background: #12131a;
      color: #f2f2f2;
      font-size: 1rem;
      margin-top: 8px;
      font-family: inherit;
      resize: vertical;
      min-height: 70px;
    }
    .color-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
    }
    .color-swatch.selected {
      border-color: white;
    }
    .image-preview {
      width: 100%;
      height: 140px;
      border-radius: 12px;
      background: #12131a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6a6a75;
      margin-top: 8px;
      overflow: hidden;
      border: 1px dashed #3a3d4d;
    }
    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .pack-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    .mini-card {
      border-radius: 14px;
      padding: 12px;
      position: relative;
      color: white;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .mini-card .card-name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .mini-card .card-desc {
      font-size: 0.72rem;
      opacity: 0.85;
      margin-top: 2px;
    }
    .remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.4);
      border: none;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1;
      margin: 0;
      padding: 0;
    }
    .empty-msg {
      color: #6a6a75;
      text-align: center;
      font-size: 0.85rem;
      grid-column: span 2;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back</a>
  <h1>Card Pack Creator</h1>
  <p class="subtitle">Design the roles for your game</p>

  <div class="card" id="savedPackBanner" style="display:none;">
    <label>You have a saved pack: <span id="savedPackName"></span></label>
    <button class="btn-primary" id="useSavedBtn">Use This Pack & Continue</button>
    <button class="btn-secondary" id="startFreshBtn">Create a New Pack Instead</button>
  </div>

  <div class="card card-form" id="creatorSection">
    <label for="cardName">Card Name</label>
    <input id="cardName" type="text" maxlength="24" placeholder="e.g. Wolf" />

    <label for="cardDesc">Description / Power</label>
    <textarea id="cardDesc" maxlength="200" placeholder="e.g. Wakes at night with the other wolves and chooses a victim."></textarea>

    <label>Card Color</label>
    <div class="color-row" id="colorRow"></div>

    <label for="cardImage">Picture (optional)</label>
    <input id="cardImage" type="file" accept="image/*" />
    <div class="image-preview" id="imagePreview">No image</div>

    <button class="btn-primary" id="addCardBtn">Add Card</button>
  </div>

  <div class="card">
    <label>Your Pack (<span id="cardCount">0</span> cards)</label>
    <div class="pack-grid" id="packGrid">
      <p class="empty-msg">No cards yet — add your first one above.</p>
    </div>
  </div>

  <div class="card">
    <label for="packName">Pack Name</label>
    <input id="packName" type="text" maxlength="30" placeholder="e.g. My Werewolf Pack" />
    <div class="error" id="errorMsg"></div>
    <button class="btn-primary" id="savePackBtn">Save Pack & Continue to Hosting</button>
  </div>

  <script>
    const existingPack = localStorage.getItem('activeCardPack');
    if (existingPack) {
      const parsed = JSON.parse(existingPack);
      document.getElementById('savedPackBanner').style.display = 'block';
      document.getElementById('savedPackName').textContent = `"${parsed.name}" (${parsed.cards.length} cards)`;
      document.getElementById('creatorSection').style.display = 'none';
      document.querySelectorAll('.card')[2].style.display = 'none'; // pack grid card
      document.querySelectorAll('.card')[3].style.display = 'none'; // save pack card

      document.getElementById('useSavedBtn').onclick = () => {
        window.location.href = 'host.html';
      };
      document.getElementById('startFreshBtn').onclick = () => {
        document.getElementById('savedPackBanner').style.display = 'none';
        document.getElementById('creatorSection').style.display = 'block';
        document.querySelectorAll('.card')[2].style.display = 'block';
        document.querySelectorAll('.card')[3].style.display = 'block';
      };
    }

    const colors = ['#6c5ce7', '#e17055', '#00b894', '#0984e3', '#fdcb6e', '#d63031', '#636e72', '#e84393'];
    let selectedColor = colors[0];
    let pendingImage = '';
    let cards = [];

    const colorRow = document.getElementById('colorRow');
    colors.forEach(c => {
      const dot = document.createElement('div');
      dot.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
      dot.style.background = c;
      dot.onclick = () => {
        selectedColor = c;
        document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected'));
        dot.classList.add('selected');
      };
      colorRow.appendChild(dot);
    });
    colorRow.firstChild.classList.add('selected');

    const imageInput = document.getElementById('cardImage');
    const imagePreview = document.getElementById('imagePreview');
    imageInput.onchange = () => {
      const file = imageInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        pendingImage = e.target.result;
        imagePreview.innerHTML = `<img src="${pendingImage}" />`;
      };
      reader.readAsDataURL(file);
    };

    function renderPack() {
      const grid = document.getElementById('packGrid');
      document.getElementById('cardCount').textContent = cards.length;
      if (cards.length === 0) {
        grid.innerHTML = '<p class="empty-msg">No cards yet — add your first one above.</p>';
        return;
      }
      grid.innerHTML = '';
      cards.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = 'mini-card';
        el.style.background = c.image
          ? `linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.15)), url(${c.image}) center/cover`
          : c.color;
        el.innerHTML = `
          <button class="remove-btn" data-i="${i}">✕</button>
          <div class="card-name">${c.name}</div>
          <div class="card-desc">${c.description || ''}</div>
        `;
        grid.appendChild(el);
      });
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.onclick = () => {
          cards.splice(parseInt(btn.dataset.i), 1);
          renderPack();
        };
      });
    }

    document.getElementById('addCardBtn').onclick = () => {
      const name = document.getElementById('cardName').value.trim();
      const description = document.getElementById('cardDesc').value.trim();

      if (!name) {
        alert('Give the card a name first.');
        return;
      }

      cards.push({
        name,
        description,
        color: selectedColor,
        image: pendingImage
      });

      // Reset form
      document.getElementById('cardName').value = '';
      document.getElementById('cardDesc').value = '';
      imageInput.value = '';
      pendingImage = '';
      imagePreview.innerHTML = 'No image';

      renderPack();
    };

    document.getElementById('savePackBtn').onclick = () => {
      const packName = document.getElementById('packName').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (!packName) {
        errorMsg.textContent = 'Give your pack a name.';
        return;
      }
      if (cards.length < 3) {
        errorMsg.textContent = 'Add at least 3 cards before continuing.';
        return;
      }

      const pack = { name: packName, cards };
      localStorage.setItem('activeCardPack', JSON.stringify(pack));

      window.location.href = 'host.html';
    };
  </script>
</body>
</html>
