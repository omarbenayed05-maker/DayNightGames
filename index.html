<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Day & Night</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>🌒 Day & Night</h1>
  <p class="subtitle">A social deduction party game</p>

  <div class="card">
    <button class="btn-primary" id="hostBtn">Host a Game</button>
    <button class="btn-secondary" id="joinBtn">Join a Game</button>
  </div>

  <script>
    document.getElementById('hostBtn').onclick = () => {
      window.location.href = 'pack.html';
    };
    document.getElementById('joinBtn').onclick = () => {
      window.location.href = 'join.html';
    };
  </script>
</body>
</html>
