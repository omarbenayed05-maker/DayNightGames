<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Join a Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back</a>
  <h1>Join a Game</h1>
  <p class="subtitle">Enter the room code from your host</p>

  <div class="card" id="joinForm">
    <label for="codeInput">Room Code</label>
    <input id="codeInput" type="text" inputmode="numeric" maxlength="4" placeholder="1234" />

    <label for="nameInput">Your Name</label>
    <input id="nameInput" type="text" maxlength="20" placeholder="e.g. Omar" />

    <div class="error" id="errorMsg"></div>
    <button class="btn-primary" id="joinBtn">Join</button>
  </div>

  <div class="card" id="waitingRoom" style="display:none;">
    <p style="text-align:center; color:#9a9aa5;">Waiting for host to start...</p>
    <label>Players in room (<span id="playerCount">0</span>)</label>
    <ul class="player-list" id="playerList"></ul>
  </div>

  <script type="module">
    import { db, ref, set, get, onValue, remove, onDisconnect } from './firebase-config.js';

    const codeInput = document.getElementById('codeInput');
    const nameInput = document.getElementById('nameInput');
    const errorMsg = document.getElementById('errorMsg');
    const joinBtn = document.getElementById('joinBtn');
    const joinForm = document.getElementById('joinForm');
    const waitingRoom = document.getElementById('waitingRoom');

    joinBtn.onclick = async () => {
      const code = codeInput.value.trim();
      const name = nameInput.value.trim();
      errorMsg.textContent = '';

      if (code.length !== 4) {
        errorMsg.textContent = 'Enter the 4-digit room code.';
        return;
      }
      if (!name) {
        errorMsg.textContent = 'Enter your name.';
        return;
      }

      const roomRef = ref(db, `rooms/${code}`);
      const snapshot = await get(roomRef);

      if (!snapshot.exists()) {
        errorMsg.textContent = 'Room not found. Check the code and try again.';
        return;
      }

      // Create a unique id for this player (random string)
      const playerId = 'p_' + Math.random().toString(36).slice(2, 10);
      const playerRef = ref(db, `rooms/${code}/players/${playerId}`);

      await set(playerRef, { name });

      // If this player's tab closes, remove them from the room
      onDisconnect(playerRef).remove();

      // Switch to waiting room view
      joinForm.style.display = 'none';
      waitingRoom.style.display = 'block';

      // Listen live for other players joining
      const playersRef = ref(db, `rooms/${code}/players`);
      const listEl = document.getElementById('playerList');
      const countEl = document.getElementById('playerCount');

      onValue(playersRef, (snap) => {
        const players = snap.val() || {};
        const names = Object.values(players).map(p => p.name);
        countEl.textContent = names.length;
        listEl.innerHTML = '';
        names.forEach(n => {
          const li = document.createElement('li');
          li.textContent = n;
          listEl.appendChild(li);
        });
      });
    };
  </script>
</body>
</html>
