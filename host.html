<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hosting a Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back</a>
  <h1>You're the Host</h1>
  <p class="subtitle">Share this code with your friends</p>

  <div class="card">
    <div class="room-code" id="roomCode">----</div>
    <p style="text-align:center; color:#9a9aa5; font-size:0.85rem;">Room Code</p>
  </div>

  <div class="card">
    <label>Players joined (<span id="playerCount">0</span>)</label>
    <ul class="player-list" id="playerList"></ul>
    <button class="btn-primary" id="startBtn" disabled>Start Game (need at least 3 players)</button>
  </div>

  <script type="module">
    import { db, ref, set, onValue, serverTimestamp, onDisconnect } from './firebase-config.js';

    // Generate a random 4-digit room code
    function generateCode() {
      return Math.floor(1000 + Math.random() * 9000).toString();
    }

    const roomCode = generateCode();
    document.getElementById('roomCode').textContent = roomCode;

    const roomRef = ref(db, `rooms/${roomCode}`);

    // Create the room in Firebase
    set(roomRef, {
      status: 'lobby',
      createdAt: serverTimestamp(),
      players: {}
    });

    // If the host closes the tab, clean up the room after disconnect
    onDisconnect(roomRef).remove();

    // Listen for players joining, live
    const playersRef = ref(db, `rooms/${roomCode}/players`);
    const listEl = document.getElementById('playerList');
    const countEl = document.getElementById('playerCount');
    const startBtn = document.getElementById('startBtn');

    onValue(playersRef, (snapshot) => {
      const players = snapshot.val() || {};
      const names = Object.values(players).map(p => p.name);

      countEl.textContent = names.length;
      listEl.innerHTML = '';
      names.forEach(name => {
        const li = document.createElement('li');
        li.textContent = name;
        listEl.appendChild(li);
      });

      if (names.length >= 3) {
        startBtn.disabled = false;
        startBtn.textContent = 'Start Game';
      } else {
        startBtn.disabled = true;
        startBtn.textContent = `Start Game (need at least 3 players)`;
      }
    });

    startBtn.onclick = () => {
      alert("Next step: we'll build card packs and the actual game start here!");
    };
  </script>
</body>
</html>
